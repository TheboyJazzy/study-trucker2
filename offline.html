
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Study Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #388e3c;
        }
        
        .progress-info {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📚</div>
        <h1>You're Offline</h1>
        <p>Don't worry! You can still:</p>
        
        <div class="progress-info">
            <p>✓ View your study progress</p>
            <p>✓ Mark days as completed</p>
            <p>✓ Changes will sync when you're back online</p>
        </div>
        
        <p>Please check your internet connection and try again.</p>
        
        <a href="javascript:location.reload()" class="btn">🔄 Retry Connection</a>
        
        <p style="margin-top: 20px; font-size: 0.9em; color: #999;">
            Study Tracker works offline - your data is safe!
        </p>
    </div>
    
    <script>
        // Try to reconnect
        function checkConnection() {
            if (navigator.onLine) {
                window.location.href = 'index.html';
            }
        }
        
        // Check every 5 seconds
        setInterval(checkConnection, 5000);
        
        // Listen for online event
        window.addEventListener('online', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
