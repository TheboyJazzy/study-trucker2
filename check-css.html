<!DOCTYPE html>
<html>
<head>
    <title>CSS File Check</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .file-list { margin: 20px 0; }
        .file-item { padding: 10px; margin: 5px 0; background: #f5f5f5; border-radius: 5px; }
        .exists { color: green; }
        .missing { color: red; }
        .btn { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px 5px; }
    </style>
</head>
<body>
    <h1>📁 File Structure Check</h1>
    
    <div id="file-check"></div>
    
    <button class="btn" onclick="checkFiles()">Re-check Files</button>
    <button class="btn" onclick="location.href='index.html'">Go to App</button>
    
    <script>
        const requiredFiles = [
            'index.html',
            'css/style.css',
            'script.js',
            'manifest.json',
            'service-worker.js',
            'db.php',
            'get_data.php',
            'update.php',
            'icons/icon-192.png',
            'icons/icon-512.png'
        ];
        
        async function checkFiles() {
            const container = document.getElementById('file-check');
            let html = '<div class="file-list">';
            
            for (const file of requiredFiles) {
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    const exists = response.ok;
                    
                    html += `<div class="file-item ${exists ? 'exists' : 'missing'}">
                        ${exists ? '✅' : '❌'} ${file}
                    </div>`;
                    
                } catch {
                    html += `<div class="file-item missing">
                        ❌ ${file} (Failed to check)
                    </div>`;
                }
            }
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // Initial check
        checkFiles();
    </script>
</body>
</html>
